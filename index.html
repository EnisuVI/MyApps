<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnisuVI Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand">enisuvi.cloud</div>
    </header>

    <main class="app-grid">
        
        <a href="https://drive.enisuvi.cloud" target="_blank" class="app-item">
            <div class="app-card">
                <span class="app-title">MyDrive</span>
                </div>
            <div class="app-domain">drive.enisuvi.cloud</div>
        </a>

        <a href="https://status.enisuvi.cloud" target="_blank" class="app-item">
            <div class="app-card">
                <span class="app-title">Status</span>
            </div>
            <div class="app-domain">status.enisuvi.cloud</div>
        </a>

        </main>

</body>
</html>
